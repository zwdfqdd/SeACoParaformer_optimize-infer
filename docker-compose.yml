# SeACo-Paraformer 推理服务部署（TRT 10.6 + CUDA 12.6，转换推理合一）
# 用法：docker-compose up -d
services:
  seaco-asr:
    image: seaco-asr:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seaco-asr
    ports:
      - "${HOST_PORT:-8099}:8080"
    environment:
      # ─── 部署形态（详见 docs/DEPLOY.md 高并发性能调优）───
      # 默认 WORKERS=11（模式 B，A10 24GB 最优，QPS ~93/conc=120）
      # ★小 GPU/低显存（如 2080Ti 11GB）务必改回 WORKERS=1（模式 A）防 OOM
      - WORKERS=${WORKERS:-11}
      - BATCH=${BATCH:-12}
      # BATCH_TIMEOUT：工业标准 dynamic batching 的 max_queue_delay（ms），实测 10 吞吐最优
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-2000}
      # 音频最大时长（ms），超出返回 1005；默认 2 小时，0=不限
      - MAX_AUDIO_DURATION_MS=${MAX_AUDIO_DURATION_MS:-7200000}
      # 过载拒绝：并发等待超时（秒），超时返回 1007；0=无限等待
      - ACQUIRE_TIMEOUT=${ACQUIRE_TIMEOUT:-5}
      # 单 chunk 推理 future 超时（秒），防调度卡死导致请求永久挂起
      - INFER_TIMEOUT=${INFER_TIMEOUT:-120}
      # 精度方案：
      #   线上推荐 trt_int8_enc = encoder int8(QDQ) + cif/decoder/bias fp16
      #   可选 trt_fp16 / trt_fp32 / trt_int8 / onnx_fp32 / onnx_int8 / auto
      - MODEL_PRECISION=${MODEL_PRECISION:-trt_fp16}
      # ─── 稳定性/性能池化参数（★必须显式设，防 libgomp 崩溃 + 榨干 GPU）───
      # CPU 流水线线程池（Stage1 VAD + Stage2 特征提取）；默认 32（256 核最优，per-worker）
      - CPU_THREAD_POOL_SIZE=${CPU_THREAD_POOL_SIZE:-32}
      # VAD ORT session 池（round-robin 让多请求 VAD 真正并行）；默认 2（实测最优）
      - VAD_SESSION_POOL_SIZE=${VAD_SESSION_POOL_SIZE:-2}
      # TRT engine 多 stream 多 execution_context 池（weights 共享，activation 独立）
      - GPU_STREAM_POOL_SIZE=${GPU_STREAM_POOL_SIZE:-4}
      # 字级时间戳（asr[].words）：true 启用第 5 段 timestamp engine，吞吐降约 30%
      - ENABLE_WORD_TIMESTAMP=${ENABLE_WORD_TIMESTAMP:-false}
      # 热词模块开关（按需裁剪推理路径，纯通用识别可全关省开销）
      - ENABLE_HOTWORD=${ENABLE_HOTWORD:-true}                    # 路径A SeACo 在线热词
      - ENABLE_FAISS_CORRECTION=${ENABLE_FAISS_CORRECTION:-true}  # 路径B 默认词表 Faiss 纠错
      # OMP/BLAS 单线程：★必须，Silero VAD 是串行 LSTM 无 OMP 收益，多线程反致 libgomp 崩溃
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${OPENBLAS_NUM_THREADS:-1}
      # 单段精度覆盖（可选，优先级高于 MODEL_PRECISION）
      # - ENCODER_PRECISION=int8
      # - CIF_PRECISION=fp16
      # - DECODER_PRECISION=fp16
      # - BIAS_PRECISION=fp16
      # - TIMESTAMP_PRECISION=fp16   # 仅 fp32/fp16（含 BLSTM 不量化，int8 回退 fp16）
      # 本地 PT 权重目录（默认 ./models/asr/pt）
      # - PT_MODEL_DIR=/app/models/asr/pt
      # ─── Bucket/Batch 参数（改动后需重新转 engine，转换与运行共用）───
      # - BUCKET_SEQ_LENS=34,67,134
      # - VALID_BATCH_SIZES=1,2,4,8,12
      # - TRT_OPT_SEQ=67
      # - TRT_OPT_BATCH=4
      # ─── 热词参数（路径 A：SeACo 在线热词，改动 MAX/OPT 后需重新转 engine）───
      # - MAX_HOTWORD_NUM=256   # 客户端热词硬上限/截断点（默认词表恒走 Faiss，不作路由切换）
      # - OPT_HOTWORD_NUM=64    # TRT profile opt point
      # - NFILTER=50            # ASF 过滤注入 decoder 的 top-K
      # ─── 词表热更新（默认词表 + 多 worker 轮询收敛）───
      # - DEFAULT_HOTWORD_PATH=models/asr/hotwords.txt
      # - HOTWORD_RELOAD_ENABLED=true
      # - HOTWORD_POLL_INTERVAL=5
      - VERBOSE=${VERBOSE:-0}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 首次启动需构建 engine（5-10min）+ 预热
      start_period: 900s
