services:
  seaco-asr:
    image: seaco-asr:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: inference
    container_name: seaco-asr
    ports:
      - "${HOST_PORT:-8099}:8080"
    environment:
      - WORKS=${WORKS:-1}
      - BATCH=${BATCH:-12}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-2000}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # count: all
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
