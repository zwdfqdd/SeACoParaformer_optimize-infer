version: "3.8"

services:
  seaco-asr:
    build:
      context: .
      dockerfile: Dockerfile
      target: inference
    container_name: seaco-asr
    ports:
      - "${PORT:-30960}:${PORT:-30960}"
    environment:
      - WORKS=${WORKS:-1}
      - BATCH=${BATCH:-1}
      - PORT=${PORT:-30960}
      - DEVICE=${DEVICE:-auto}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_BATCH_DURATION=${MAX_BATCH_DURATION:-30}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-2000}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-30960}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
