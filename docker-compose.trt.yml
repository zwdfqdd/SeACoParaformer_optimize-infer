# v2 TensorRT 推理服务部署
# 用法：docker-compose -f docker-compose.trt.yml up -d
services:
  seaco-asr-trt:
    image: seaco-asr:trt
    build:
      context: .
      dockerfile: Dockerfile.trt
    container_name: seaco-asr-trt
    ports:
      - "${HOST_PORT:-8099}:8080"
    environment:
      - WORKS=${WORKS:-1}
      - BATCH=${BATCH:-12}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-2000}
      - MODEL_PRECISION=${MODEL_PRECISION:-auto}
      - VERBOSE=${VERBOSE:-0}
    volumes:
      # TRT engine 缓存（首次构建后持久化，避免重启重新构建）
      - trt_engine_cache:/app/models/asr/trt
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 首次启动需要构建 engine（5-10min）+ 预热（5-6min）
      start_period: 900s

volumes:
  trt_engine_cache:
    driver: local
