# docker-compose.yml
services:
  asr-server:
    image: zhxgharbor.istarshine.com/asr/seaco-asr-onnx:v1-202605151620
    container_name: asr-server
    restart: unless-stopped  # 容器退出时自动重启，除非是用户手动停止的。

    # =========================================================================
    # GPU 配置：使用 GPU 0 卡
    # =========================================================================
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']          # 使用 GPU 0
              capabilities: [gpu]

    # =========================================================================
    # 环境变量：核心性能参数
    # =========================================================================
    environment:
      - WORKS=${WORKS:-1}
      - BATCH=${BATCH:-12}
      - BATCH_TIMEOUT=${BATCH_TIMEOUT:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-2000}

    # =========================================================================
    # 端口映射
    # =========================================================================
    ports:
      - "30960:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # =========================================================================
    # 日志配置
    # =========================================================================
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    # 网络配置
    #networks:
      #- app-network